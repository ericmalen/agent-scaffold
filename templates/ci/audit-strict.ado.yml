# audit-strict — adopted repos must stay conformant to the ai-kit target state.
# Installed by adoption for repos with Azure DevOps CI (alongside docs-impact).
# Add as a PR build validation policy on the target branch.
#
# The audit engine is NOT vendored into adopted repos (adopt-verify removes the
# adoption tooling before merge), so CI shallow-clones the kit. The clone URL is
# read from .claude/ai-kit.json (field "kitRepo"). For a PRIVATE kit repo, grant
# the build service read access to it, or inject a PAT into the clone URL.
trigger: none
pr:
  branches:
    include: ['*']
pool:
  vmImage: ubuntu-latest
steps:
  - checkout: self
    fetchDepth: 1
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
  - bash: |
      set -euo pipefail
      KIT_URL="$(node -e "process.stdout.write(require('./.claude/ai-kit.json').kitRepo)")"
      git clone --depth 1 "$KIT_URL" "$(Agent.TempDirectory)/ai-kit"
      node "$(Agent.TempDirectory)/ai-kit/scripts/audit.mjs" --root . --strict
    displayName: audit --strict (clone kit from marker)
