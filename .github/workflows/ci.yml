# Kit-repo CI (GitHub Actions mirror of azure-pipelines.yml).
# ADO is the primary pipeline; this mirror keeps GitHub clones honest.
# Gates (V2-PLAN 4.1): unit tests, rule↔check integrity (R-51),
# docs consistency, and build-starter → audit --strict (starter must stay clean).
name: ci
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Unit tests
        run: npm test
      - name: rule↔check integrity (R-51)
        run: node scripts/rule-check-map.mjs
      - name: docs consistency
        run: node scripts/docs-consistency.mjs
      - name: build starter + audit --strict
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/starter"
          node scripts/build-starter.mjs "$OUT" --git
          node scripts/audit.mjs --root "$OUT" --strict
      - name: Publish starter artifact
        uses: actions/upload-artifact@v4
        with:
          name: starter
          path: ${{ runner.temp }}/starter
